; ============================================================
;  Rover — nRF52840 BLE Motor/Sensor Hub Firmware
;  PlatformIO project configuration
;
;  This is the BLE variant of the Teensy firmware.
;  Communicates with the Pi via BLE UART (Nordic UART Service)
;  instead of USB Serial.
; ============================================================
[platformio]
default_envs = xiao_nrf52840_sense

[env:xiao_nrf52840_sense]
platform  = nordicnrf52
board     = xiaoblesense
framework = arduino

monitor_speed = 115200

lib_deps =

build_flags =
    -O2
    -DNRF52_ROVER
    -DXIAO_NRF52840_SENSE
