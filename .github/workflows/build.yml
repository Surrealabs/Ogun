name: Ogun Rover — Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  TEENSY_ENV: teensy41

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run verify checks
        run: |
          chmod +x scripts/verify.sh
          ./scripts/verify.sh

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          source VERSION
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          if [ -n "$VERSION_TAG" ]; then
            case "$VERSION_TAG" in
              .*|-*) VERSION_FULL="${VERSION}${VERSION_TAG}" ;;
              *)     VERSION_FULL="${VERSION}-${VERSION_TAG}" ;;
            esac
          else
            VERSION_FULL="${VERSION}"
          fi
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "version=$VERSION_FULL" >> "$GITHUB_OUTPUT"
          echo "build=${VERSION_FULL}+${GIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "Building Ogun $VERSION_FULL ($GIT_HASH)"

      - name: Generate version headers
        run: |
          chmod +x scripts/gen-version.sh
          scripts/gen-version.sh --cpp pi_server/src/Version.hpp
          scripts/gen-version.sh --cpp teensy_firmware/src/Version.hpp

      # ---------- Build rover_server natively in arm64 Docker ----------
      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build rover_server (arm64 native in Docker)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace/pi_server \
            debian:bookworm bash -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build pkg-config \
                libgpiod-dev libjpeg-dev libssl-dev libsystemd-dev \
                libudev-dev \
                git ca-certificates

              # Build rover_server
              cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=MinSizeRel \
                -GNinja
              cmake --build build -j$(nproc)
              strip build/rover_server

              echo "rover_server: $(du -h build/rover_server | cut -f1)"
            '

      # ---------- Build Teensy firmware (.hex) -----------------
      - name: Install PlatformIO
        run: |
          pip install platformio
          pio --version

      - name: Build Teensy firmware
        run: |
          cd teensy_firmware
          pio run -e ${{ env.TEENSY_ENV }}
          echo "firmware.hex: $(du -h .pio/build/${{ env.TEENSY_ENV }}/firmware.hex | cut -f1)"

      # ---------- Package everything --------------------------
      - name: Create update package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="ogun-${VERSION}"
          PKG_DIR="${{ github.workspace }}/${PKG}"

          mkdir -p "$PKG_DIR"

          # Binaries
          cp pi_server/build/rover_server "$PKG_DIR/"
          cp teensy_firmware/.pio/build/${{ env.TEENSY_ENV }}/firmware.hex "$PKG_DIR/teensy_firmware.hex"

          # Config / service files
          cp pi_server/scripts/rover.service       "$PKG_DIR/"
          cp pi_server/scripts/rover.conf.example  "$PKG_DIR/"

          # WebUI assets
          if [ -d pi_server/webui ]; then
            cp -r pi_server/webui "$PKG_DIR/webui"
          fi

          # Self-update script
          cp scripts/apply-update.sh "$PKG_DIR/"
          chmod +x "$PKG_DIR/apply-update.sh"
          cp ogun "$PKG_DIR/"
          chmod +x "$PKG_DIR/ogun"
          cp scripts/rover-auto-update.sh "$PKG_DIR/"
          chmod +x "$PKG_DIR/rover-auto-update.sh"
          cp scripts/rover-auto-update.service "$PKG_DIR/"
          cp scripts/rover-auto-update.timer "$PKG_DIR/"
          cp scripts/rover-auto-update.env.example "$PKG_DIR/"

          # Version metadata
          echo "${{ steps.version.outputs.build }}" > "$PKG_DIR/BUILD"

          # Tarball
          TARBALL="ogun-${VERSION}-aarch64.tar.gz"
          tar -czf "$TARBALL" -C "${{ github.workspace }}" "$PKG/"

          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Package contents:"
          ls -lh "$PKG_DIR/"
          echo "Tarball: $(du -h "$TARBALL" | cut -f1)"

      # ---------- Upload artifact (for PRs / CI) --------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.pkg_name }}
          path: ${{ steps.package.outputs.tarball }}

      # ---------- GitHub Release (on tag push) ----------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Ogun ${{ steps.version.outputs.version }}"
          body: |
            ## Ogun ${{ steps.version.outputs.version }}

            **Included:**
            - `rover_server` — ARM64 binary for BTT Pi 1.2
            - `teensy_firmware.hex` — Teensy 4.1 firmware (120 MHz)
            - WebUI assets, config templates, systemd service

            **Install on the Pi:**
            ```bash
            sudo ogun update
            ```
            Or manually:
            ```bash
            wget <tarball-url> -O /tmp/ogun-update.tar.gz
            cd /tmp && tar xzf ogun-update.tar.gz
            cd ogun-*/ && sudo ./apply-update.sh --flash-teensy
            ```
          files: ${{ steps.package.outputs.tarball }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
