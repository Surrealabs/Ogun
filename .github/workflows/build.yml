name: Ogun Rover — Build & Release

# Triggers:
#   - Every push to main (CI check)
#   - Git tags like v0.1.0 → create a GitHub Release with the tarball

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  TEENSY_ENV: teensy41

jobs:
  # ============================================================
  #  Build rover_server (ARM64 cross-compile) + Teensy firmware
  # ============================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Read version
        id: version
        run: |
          source VERSION
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          if [ -n "$VERSION_TAG" ]; then
            VERSION_FULL="${VERSION}-${VERSION_TAG}"
          else
            VERSION_FULL="${VERSION}"
          fi
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "version=$VERSION_FULL" >> "$GITHUB_OUTPUT"
          echo "build=${VERSION_FULL}+${GIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "Building Ogun $VERSION_FULL ($GIT_HASH)"

      # ---------- ARM64 cross-compiler + Pi libraries ----------
      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            cmake ninja-build pkg-config

      # Enable running arm64 Docker containers on x86 runner
      - name: Set up QEMU for multi-arch Docker
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # We use a Docker arm64 sysroot to get the Pi's libraries
      - name: Set up ARM64 sysroot
        run: |
          SYSROOT=${{ github.workspace }}/pi_server/sysroot-arm64
          mkdir -p "$SYSROOT/usr"

          # Pull arm64 packages via debootstrap-like approach
          # Using a minimal Docker container to extract headers/libs
          docker run --rm --platform linux/arm64 \
            -v "$SYSROOT":/sysroot \
            debian:bookworm bash -c '
              apt-get update && apt-get install -y --no-install-recommends \
                libgpiod-dev libjpeg-dev libssl-dev libdbus-1-dev \
                libudev-dev libsystemd-dev pkg-config
              # Copy headers and libraries to sysroot
              cp -a /usr/include /sysroot/usr/include
              mkdir -p /sysroot/usr/lib/aarch64-linux-gnu
              cp -a /usr/lib/aarch64-linux-gnu/*.so* /sysroot/usr/lib/aarch64-linux-gnu/ 2>/dev/null || true
              cp -a /usr/lib/aarch64-linux-gnu/*.a /sysroot/usr/lib/aarch64-linux-gnu/ 2>/dev/null || true
              cp -a /usr/lib/aarch64-linux-gnu/pkgconfig /sysroot/usr/lib/aarch64-linux-gnu/ 2>/dev/null || true
            '

      # Build sdbus-c++ for ARM64 in the sysroot
      - name: Cross-build sdbus-c++ for ARM64
        run: |
          SYSROOT=${{ github.workspace }}/pi_server/sysroot-arm64
          git clone --depth=1 --branch v2.1.0 \
            https://github.com/Kistler-Group/sdbus-cpp.git /tmp/sdbus-cpp

          cat > /tmp/toolchain-aarch64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER   aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

          cmake -S /tmp/sdbus-cpp -B /tmp/sdbus-cpp/build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/toolchain-aarch64.cmake \
            -DCMAKE_SYSROOT="$SYSROOT" \
            -DCMAKE_INSTALL_PREFIX="$SYSROOT/usr/local" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOC=OFF
          cmake --build /tmp/sdbus-cpp/build -j$(nproc)
          cmake --install /tmp/sdbus-cpp/build

      # ---------- Cross-compile rover_server -------------------
      - name: Generate version header
        run: |
          chmod +x scripts/gen-version.sh
          scripts/gen-version.sh --cpp pi_server/src/Version.hpp
          scripts/gen-version.sh --cpp teensy_firmware/src/Version.hpp
          cat pi_server/src/Version.hpp

      - name: Cross-compile rover_server for ARM64
        run: |
          SYSROOT=${{ github.workspace }}/pi_server/sysroot-arm64
          BUILD_DIR=${{ github.workspace }}/pi_server/build-cross

          mkdir -p "$BUILD_DIR"
          cat > "$BUILD_DIR/toolchain-aarch64.cmake" << EOF
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER   aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_STRIP        aarch64-linux-gnu-strip)
          set(CMAKE_SYSROOT "${SYSROOT}")
          set(CMAKE_FIND_ROOT_PATH "${SYSROOT}")
          list(APPEND CMAKE_PREFIX_PATH "${SYSROOT}/usr/local")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

          cmake -S pi_server -B "$BUILD_DIR" \
            -DCMAKE_TOOLCHAIN_FILE="$BUILD_DIR/toolchain-aarch64.cmake" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -GNinja

          cmake --build "$BUILD_DIR" -j$(nproc)
          aarch64-linux-gnu-strip "$BUILD_DIR/rover_server"

          echo "rover_server: $(du -h "$BUILD_DIR/rover_server" | cut -f1)"
          file "$BUILD_DIR/rover_server"

      # ---------- Build Teensy firmware (.hex) -----------------
      - name: Install PlatformIO
        run: |
          pip install platformio
          pio --version

      - name: Build Teensy firmware
        run: |
          cd teensy_firmware
          pio run -e ${{ env.TEENSY_ENV }}
          echo "firmware.hex: $(du -h .pio/build/${{ env.TEENSY_ENV }}/firmware.hex | cut -f1)"

      # ---------- Package everything --------------------------
      - name: Create update package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="ogun-${VERSION}"
          PKG_DIR="${{ github.workspace }}/${PKG}"

          mkdir -p "$PKG_DIR"

          # Binaries
          cp pi_server/build-cross/rover_server "$PKG_DIR/"
          cp teensy_firmware/.pio/build/${{ env.TEENSY_ENV }}/firmware.hex "$PKG_DIR/teensy_firmware.hex"

          # Config / service files
          cp pi_server/scripts/rover.service       "$PKG_DIR/"
          cp pi_server/scripts/rover.conf.example  "$PKG_DIR/"

          # WebUI assets
          if [ -d pi_server/webui ]; then
            cp -r pi_server/webui "$PKG_DIR/webui"
          fi

          # Self-update helper (applied on the Pi)
          cp scripts/apply-update.sh "$PKG_DIR/" 2>/dev/null || \
            ${{ github.workspace }}/ogun package-script > "$PKG_DIR/apply-update.sh"
          chmod +x "$PKG_DIR/apply-update.sh"

          # Version metadata
          echo "${{ steps.version.outputs.build }}" > "$PKG_DIR/BUILD"

          # Tarball
          TARBALL="ogun-${VERSION}-aarch64.tar.gz"
          tar -czf "$TARBALL" -C "${{ github.workspace }}" "$PKG/"

          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Package contents:"
          ls -lh "$PKG_DIR/"
          echo "Tarball: $(du -h "$TARBALL" | cut -f1)"

      # ---------- Upload artifact (for PRs / CI) --------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.pkg_name }}
          path: ${{ steps.package.outputs.tarball }}

      # ---------- GitHub Release (on tag push) ----------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Ogun ${{ steps.version.outputs.version }}"
          body: |
            ## Ogun ${{ steps.version.outputs.version }}

            **Included:**
            - `rover_server` — ARM64 binary for BTT Pi 1.2
            - `teensy_firmware.hex` — Teensy 4.1 firmware
            - Config templates + systemd service

            **Install on the Pi:**
            ```bash
            sudo ogun update
            ```
            Or manually:
            ```bash
            wget <tarball-url> -O /tmp/ogun-update.tar.gz
            cd /tmp && tar xzf ogun-update.tar.gz
            cd ogun-*/ && sudo ./apply-update.sh --flash-teensy
            ```
          files: ${{ steps.package.outputs.tarball }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
