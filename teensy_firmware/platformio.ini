; ============================================================
;  Rover — Teensy Sensor/Motor Hub Firmware
;  PlatformIO project configuration
; ============================================================
[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; Monitor / upload
monitor_speed    = 115200
upload_protocol  = teensy-cli    ; uses teensy_loader_cli

; Libraries
lib_deps =
    ; Encoder counting (optional hardware encoder support)
    paulstoffregen/Encoder @ ^1.4.2
    ; For I²C sensors (optional)
    Wire

build_flags =
    -DUSB_HW_SERIAL          ; expose Teensy USB as Serial (CDC)
    -DARDUINO_USB_SPEED=480  ; High-speed USB
    -O2

; ----- Alternate board targets ------------------------------
[env:teensy40]
platform  = teensy
board     = teensy40
framework = arduino
monitor_speed    = 115200
upload_protocol  = teensy-cli
lib_deps =
    paulstoffregen/Encoder @ ^1.4.2
build_flags = -O2
